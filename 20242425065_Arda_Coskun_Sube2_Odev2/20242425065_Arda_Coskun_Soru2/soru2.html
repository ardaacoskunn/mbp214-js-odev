<!DOCTYPE html>
<html>
<head>
  <title>Öğrenci Kontrolü</title>
</head>
<body>

  <h1>Öğrenci Kontrolü</h1>

  <script>
    let yas = Number(prompt("Yaşınızı giriniz:"));

    if (isNaN(yas)) {
      alert("Geçerli bir yaş giriniz!");
    } else if (yas < 18) {
      alert("Reşit değilsiniz.");
    } else {
      let ogrenciMi = confirm("Öğrenci misiniz?");

      if (ogrenciMi == true) {
        alert("Hoşgeldiniz öğrenci!");
      } else {
        alert("Hoşgeldiniz!");
      }
    }
  </script>

</body>
</html>
